name: Board Auto-Transition

on:
  pull_request:
    types: [opened, closed]

jobs:
  transition:
    runs-on: ubuntu-latest
    steps:
      - name: Extract issue number
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=$(gh pr view ${{ github.event.pull_request.number }} --json body -q '.body' | grep -oP '#\d+' | head -1 | tr -d '#')
          echo "number=$ISSUE" >> "$GITHUB_OUTPUT"

      - name: Transition to In Review
        if: github.event.action == 'opened' && steps.issue.outputs.number != ''
        uses: pateketrueke/board-transition-action@main
        with:
          issue-number: ${{ steps.issue.outputs.number }}
          status: "In Review"
          project-number: 2
          owner: pateketrueke
          token: ${{ secrets.PROJECT_TOKEN }}

      - name: Transition to Done
        if: github.event.action == 'closed' && github.event.pull_request.merged == true && steps.issue.outputs.number != ''
        uses: pateketrueke/board-transition-action@main
        with:
          issue-number: ${{ steps.issue.outputs.number }}
          status: "Done"
          project-number: 2
          owner: pateketrueke
          token: ${{ secrets.PROJECT_TOKEN }}
