name: Board Auto-Transition

on:
  pull_request:
    types: [opened, closed]

jobs:
  transition:
    runs-on: ubuntu-latest
    steps:
      - name: Transition on PR opened
        if: github.event.action == 'opened'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          ISSUE=$(gh pr view ${{ github.event.pull_request.number }} --json body -q '.body' | grep -oP '#\d+' | head -1 | tr -d '#')
          if [ -z "$ISSUE" ]; then
            echo "No issue reference found in PR body"
            exit 0
          fi
          STATUS="In Review"
          PROJECT_NUMBER=2
          OWNER="pateketrueke"
          PROJECT_ID="PVT_kwHOAAMmI84Bbx3K"

          OPTION_ID=$(gh api graphql -f query='
          query($owner: String!, $number: Int!) {
            user(login: $owner) {
              projectV2(number: $number) {
                field(name: "Status") {
                  ... on ProjectV2SingleSelectField { options { id name } }
                }
              }
            }
          }' -F owner="$OWNER" -F number="$PROJECT_NUMBER" \
            | python3 -c "
          import sys, json
          options = json.load(sys.stdin)['data']['user']['projectV2']['field']['options']
          match = [o for o in options if o['name'].lower() == '$STATUS'.lower()]
          print(match[0]['id'] if match else '')
          ")

          ITEM_ID=$(gh api graphql -f query='
          query($owner: String!, $number: Int!) {
            user(login: $owner) {
              projectV2(number: $number) {
                items(first: 100) {
                  nodes { id content { ... on Issue { number } } }
                }
              }
            }
          }' -F owner="$OWNER" -F number="$PROJECT_NUMBER" \
            | python3 -c "
          import sys, json
          items = json.load(sys.stdin)['data']['user']['projectV2']['items']['nodes']
          match = [i for i in items if i.get('content', {}).get('number') == $ISSUE]
          print(match[0]['id'] if match else '')
          ")

          FIELD_ID=$(gh api graphql -f query='
          query($owner: String!, $number: Int!) {
            user(login: $owner) {
              projectV2(number: $number) {
                field(name: "Status") {
                  ... on ProjectV2SingleSelectField { id }
                }
              }
            }
          }' -F owner="$OWNER" -F number="$PROJECT_NUMBER" \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['data']['user']['projectV2']['field']['id'])")

          gh api graphql -f query='
          mutation($project: ID!, $item: ID!, $field: ID!, $option: String!) {
            updateProjectV2ItemFieldValue(input: {
              projectId: $project
              itemId: $item
              fieldId: $field
              value: { singleSelectOptionId: $option }
            }) { projectV2Item { id } }
          }' -F project="$PROJECT_ID" -F item="$ITEM_ID" -F field="$FIELD_ID" -F option="$OPTION_ID" > /dev/null

          echo "Issue #$ISSUE → $STATUS"

      - name: Transition on PR merged
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          ISSUE=$(gh pr view ${{ github.event.pull_request.number }} --json body -q '.body' | grep -oP '#\d+' | head -1 | tr -d '#')
          if [ -z "$ISSUE" ]; then
            echo "No issue reference found in PR body"
            exit 0
          fi
          STATUS="Done"
          PROJECT_NUMBER=2
          OWNER="pateketrueke"
          PROJECT_ID="PVT_kwHOAAMmI84Bbx3K"

          OPTION_ID=$(gh api graphql -f query='
          query($owner: String!, $number: Int!) {
            user(login: $owner) {
              projectV2(number: $number) {
                field(name: "Status") {
                  ... on ProjectV2SingleSelectField { options { id name } }
                }
              }
            }
          }' -F owner="$OWNER" -F number="$PROJECT_NUMBER" \
            | python3 -c "
          import sys, json
          options = json.load(sys.stdin)['data']['user']['projectV2']['field']['options']
          match = [o for o in options if o['name'].lower() == '$STATUS'.lower()]
          print(match[0]['id'] if match else '')
          ")

          ITEM_ID=$(gh api graphql -f query='
          query($owner: String!, $number: Int!) {
            user(login: $owner) {
              projectV2(number: $number) {
                items(first: 100) {
                  nodes { id content { ... on Issue { number } } }
                }
              }
            }
          }' -F owner="$OWNER" -F number="$PROJECT_NUMBER" \
            | python3 -c "
          import sys, json
          items = json.load(sys.stdin)['data']['user']['projectV2']['items']['nodes']
          match = [i for i in items if i.get('content', {}).get('number') == $ISSUE]
          print(match[0]['id'] if match else '')
          ")

          FIELD_ID=$(gh api graphql -f query='
          query($owner: String!, $number: Int!) {
            user(login: $owner) {
              projectV2(number: $number) {
                field(name: "Status") {
                  ... on ProjectV2SingleSelectField { id }
                }
              }
            }
          }' -F owner="$OWNER" -F number="$PROJECT_NUMBER" \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['data']['user']['projectV2']['field']['id'])")

          gh api graphql -f query='
          mutation($project: ID!, $item: ID!, $field: ID!, $option: String!) {
            updateProjectV2ItemFieldValue(input: {
              projectId: $project
              itemId: $item
              fieldId: $field
              value: { singleSelectOptionId: $option }
            }) { projectV2Item { id } }
          }' -F project="$PROJECT_ID" -F item="$ITEM_ID" -F field="$FIELD_ID" -F option="$OPTION_ID" > /dev/null

          echo "Issue #$ISSUE → $STATUS"
